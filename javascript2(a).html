<html>
<body>
<script>
// for loop
for(i=1;i<=5;i++)
{
document.write(i+"<br/>")
}
</script>
<hr/>
<script>
// while loop
var i=11;
while (i<=15)
{
document.write(i+"<br/>");
i++;
}
</script>
<hr/>
<!-- do while loop-->
<script>
var i=21;
do{
document.write(i+"<br/>");
i++;
}while(i<=25);
</script>
</body>
</html>
