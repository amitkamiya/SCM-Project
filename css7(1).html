<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 200px;
            height: 100px;
            background: red;
        }
        #div1{
            margin-top: 50px;
            transform: rotate(30deg);
        }
        #div2{
            margin-top: 200px;
            margin-left: 100px;
            transform: scale(2,3);
        }
        #div3{
            margin-top: 200px;
            margin-left: 100px;
            transform: rotateY(120deg);
        }
        #div4{
            margin-top: 200px;
            margin-left: 100px;
            transform: skewX(40deg);
        }
        #div5{
            margin-top: 200px;
            margin-left: 100px;
            transform: translate(100px,200px);
        }
    </style>
</head>
<body>
    <div>Tranform in CSS</div>
    <div id="div1">Welcome to transform</div>
    <div id="div2">hello CSS</div>
    <div id="div3">GOOD LUCK</div>
    <div id="div4">SKEW</div>
    <div id="div5">TRANSLATE</div>
</body>
</html>
