<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSEUDO CODE</title>
    <style>
        h1::before{
            content: url()
        }
        ::selection
        {
            color: aqua;
            background-color: blanchedalmond;
        }
        h2::hover{
            color: blueviolet;
        }
    </style>
</head>
<body>
    <h1>PSEUDO CODE</h1>
    <p>This is pseudo code</p>
    <h2>have fun with pseudo</h2>
</body>
</html>
