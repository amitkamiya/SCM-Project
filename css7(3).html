<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #circle{
            background: cyan;
            width: 100px;
            height: 100px;
            border-radius: 50px;
            transition: 4s;
        }
        #circle:hover{
            transform: translate(500px);
            background: red;
        }
    </style>
</head>
<body>
    <div>ANIMATIONS IN CSS</div>
    <div id="circle">BALL</div>
</body>
</html>
