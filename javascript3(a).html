<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let day;
        switch(new Date().getDate())
        {case 0:
            day="sunday";
            break;
        case 1:day="monday";
            break;
        case 2:day="tuesday";
            break;
        case 3:
                day="wednesday";
                break;
                default:
                    day="no case found";
                    break;
                    document.write(day);
        }   
        document.write(day);
    </script>

</body>
</html>
