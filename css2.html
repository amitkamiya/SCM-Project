<!--CSS SELECTORS-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS SELECTORS</title>
    <style>
#para1{
    color:blue;
}
h1{
    color:aqua;
}
.class1{
    text-align: center;
}
*{
    text-align: center;
}
h1,p{text-align: right;}

    </style>
</head>
<body>
    <h1>CSS SELECTORS</h1>
    <p id="para1">Group 5 has 86 students</p>
    <p class="class1">Group 1 has 100 students</p> 
</body>
</html>
