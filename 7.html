<html>
<head>
    <title>Text Input Control</title>
</head>
<body>
<form>
    First name:<input type="text"name="first_name"/><div></div>
    Last name:<input type="text"name="last_name"/><div></div>
    User ID:<input type="text"name="user_id"/><div></div>
    Password:<input type="password"name="password"/><div></div>
    Description:<br>
    <textarea rows="5" cols="50" name="description">
        ENTER DESCRIPTION HERE...
    </textarea><br>
    <input type="checkbox"name="C++"value="on">C++<br>
    <input type="checkbox"name="C#"value="on">C#<br>
    <input type="checkbox"name="JAVA"value="on">JAVA<br>
    Gender:<br>
    <input type="radio"name="female"value="on">female<br>
    <input type="radio"name="male"value="on">male<br>
    <select name="dropdown">
         <option value="C++"selected>C++</option>
         <option value="JAVA"selected>JAVA</option>
         <option value="HTML"selected>HTML</option>
    </select>
     <br><input type="file"name="fileupload">
    <br> DOB:<input type="date"id="birthday"name="birthday">
    <br><input type="submit">
</form>
</body>
</html>
